<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <header class="app-head">
    <span class="dot" aria-hidden="true"></span>
    <h1>Settings</h1>
  </header>

  <main>
    <section class="group">
      <h2>Overlay font size</h2>
      <div class="segmented" id="font-size" role="radiogroup" aria-label="Overlay font size">
        <button data-value="s" role="radio">S</button>
        <button data-value="m" role="radio">M</button>
        <button data-value="l" role="radio">L</button>
        <button data-value="xl" role="radio">XL</button>
      </div>
    </section>

    <section class="group">
      <h2>Panel scale <span class="val" id="panel-scale-val">1.0×</span></h2>
      <input type="range" id="panel-scale" min="1" max="1.5" step="0.05" aria-label="Panel scale" />
    </section>

    <section class="group">
      <h2>Theme</h2>
      <div class="segmented" id="theme" role="radiogroup" aria-label="Theme">
        <button data-value="dark" role="radio">Dark</button>
        <button data-value="light" role="radio">Light</button>
        <button data-value="system" role="radio">System</button>
      </div>
    </section>

    <section class="group toggles">
      <label class="toggle">
        <input type="checkbox" id="badges" />
        <span>Show badge dots on tagged icons</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="reduced-motion" />
        <span>Reduce motion (disable animations)</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="high-contrast" />
        <span>High contrast (solid colors)</span>
      </label>
    </section>

    <p class="hint">Changes apply immediately and are saved automatically.</p>
  </main>

  <script type="module" src="settings.js"></script>
</body>
</html>
