name: ci

# Compile/test gate on every PR and push to main, on both target platforms
# (B2: one branch, CI matrix — no per-platform branches). macOS runners are
# Apple silicon, matching the beta target hardware. This is only the compile
# and unit-test gate: behavior (hover, overlay, badges) is verified by hand —
# CI cannot grant the Accessibility permission the macOS hover engine needs.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      # Frontend must be built first: tauri's generate_context! embeds
      # app/ui/dist at compile time.
      - name: Build frontend
        run: npm ci && npm run build
        working-directory: app/ui

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Format check
        run: cargo fmt --check
        working-directory: app/src-tauri

      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: app/src-tauri

      - name: Tests
        run: cargo test
        working-directory: app/src-tauri

      # Sideloadable arm64 build for beta hardware testing. Ad-hoc signing
      # (bundle.macOS.signingIdentity "-") is mandatory, not cosmetic: an
      # unsigned bundle plus the quarantine flag makes Apple silicon refuse
      # to launch it as "damaged" — the Open Anyway path never appears.
      # Updater artifacts are skipped: the signing key is a release secret and
      # updater .dmgs are not what this artifact is for.
      - name: Build .dmg
        if: matrix.os == 'macos-latest'
        # beforeBuildCommand is cleared: the frontend is already built by the
        # earlier step, and the CLI resolves the command's relative path from
        # a different cwd than tauri-action does (release.yml keeps it).
        run: >
          npx --yes @tauri-apps/cli@^2 build --bundles dmg
          --config '{"build":{"beforeBuildCommand":""},"bundle":{"createUpdaterArtifacts":false}}'
        working-directory: app/src-tauri

      # Fail loudly if the bundle ships unsigned again — the previous build
      # did, and the only symptom was a "damaged app" dialog on the tester's
      # Mac.
      - name: Verify bundle signature
        if: matrix.os == 'macos-latest'
        run: codesign --verify --strict --verbose=2 "target/release/bundle/macos/Tofu Nuggets.app"
        working-directory: app/src-tauri

      - name: Upload .dmg artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: tofu-nuggets-macos-arm64-dmg
          path: app/src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 14
